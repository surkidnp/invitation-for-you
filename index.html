<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Соглашайся!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fdeff2 0%, #fff3e6 50%, #fce4ec 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 245, 240, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 215, 180, 0.3);
            border: 1px solid rgba(255, 245, 220, 0.7);
            transition: all 0.3s ease;
        }
        .step {
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.4s ease;
            opacity: 1;
            transform: translateY(0);
        }
        .step.hidden-step {
            display: none;
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
        }
        .romantic-checkbox {
            accent-color: #d48d8b;
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 0.6rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .romantic-checkbox:hover {
            transform: scale(1.1);
        }
        input[type="datetime-local"] {
            background: rgba(255, 250, 240, 0.85);
            border: 1px solid #f3cfc3;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            font-family: 'Montserrat', sans-serif;
            color: #5e3a3a;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }
        input[type="datetime-local"]:focus {
            border-color: #e2a091;
            box-shadow: 0 0 0 3px rgba(210, 120, 100, 0.2);
        }
        textarea {
            background: rgba(255, 250, 240, 0.85);
            border: 1px solid #f3cfc3;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            font-family: 'Montserrat', sans-serif;
            resize: vertical;
            width: 100%;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #ffe2dc;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c68b7c;
            border-radius: 10px;
        }
        .btn-yes {
            background: linear-gradient(95deg, #e6a492, #d6856e);
            box-shadow: 0 8px 18px rgba(200, 100, 80, 0.3);
            transition: all 0.2s ease;
        }
        .btn-yes:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ecb2a0, #de8f78);
            box-shadow: 0 12px 22px rgba(200, 100, 80, 0.4);
        }
        .no-btn {
            transition: transform 0.2s cubic-bezier(0.2, 1.2, 0.8, 1);
            cursor: pointer;
            will-change: transform;
            position: relative;
        }
        .falling-sticker {
            position: fixed;
            top: -100px;
            user-select: none;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.7;
            animation: fallSticker linear forwards;
        }
        @keyframes fallSticker {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }
            80% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(100vh) rotate(25deg);
                opacity: 0;
            }
        }
        .floating-message {
            position: fixed;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            color: #ffefdd;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 10000;
            animation: floatMsg 0.8s ease forwards;
            pointer-events: none;
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
        }
        @keyframes floatMsg {
            0% { opacity: 0; transform: translateY(0px);}
            20% { opacity: 1; transform: translateY(-8px);}
            100% { opacity: 0; transform: translateY(-30px);}
        }
        .gold-glow {
            text-shadow: 0 2px 5px rgba(255,215,150,0.6);
        }
        #buttonContainer {
            position: relative;
            min-height: 130px;
        }
        .btn-back {
            background: rgba(255, 235, 225, 0.8);
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }
        .btn-back:hover {
            background: rgba(255, 220, 200, 0.9);
            transform: translateX(-3px);
        }
        @media (max-width: 640px) {
            .glass-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8 relative">
    <div id="stickers-container" class="fixed inset-0 pointer-events-none overflow-hidden z-0"></div>
    <div class="relative z-10 w-full max-w-3xl mx-auto">
        <div class="glass-card p-5 md:p-8 w-full transition-all duration-500">
            <div id="step1" class="step w-full text-center">
                <div class="flex justify-center mb-4">
                    <span class="text-6xl animate-pulse">💖</span>
                </div>
                <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-semibold text-rose-800 mb-6 gold-glow">
                    Приветик!) ✨
                </h2>
                <p class="text-lg md:text-xl text-stone-700 mb-8 font-medium">
                    Я очень соскучился и хочу заглянуть к тебе в гости.<br> 
                    Ты согласна?
                </p>
                <div id="buttonContainer" class="flex flex-wrap justify-center gap-6 mt-4 relative items-center" style="min-height: 130px;">
                    <button id="yesBtn" class="btn-yes text-white px-8 py-3 rounded-full text-xl font-semibold shadow-lg transition-all duration-200">
                        Да! 💘
                    </button>
                    <button id="noBtn" class="no-btn bg-white/70 backdrop-blur-sm border border-rose-200 text-rose-700 px-7 py-3 rounded-full text-xl font-medium shadow-md transition-all">
                        Нет( 🙈
                    </button>
                </div>
                <p class="text-xs text-stone-400 mt-8 italic">(На кнопку "Нет" сложно нажать, Соглашайся! 😏)</p>
            </div>
            <div id="step2" class="step hidden-step w-full">
                <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-semibold text-center text-rose-800 mb-5">🍽️ Что купить?</h2>
                <div class="flex flex-wrap justify-center gap-3 mb-8">
                    <button data-cat="sweet" class="cat-btn px-5 py-2 rounded-full bg-pink-100 text-pink-700 font-medium shadow hover:shadow-md transition">Сладкое 🍫</button>
                    <button data-cat="salty" class="cat-btn px-5 py-2 rounded-full bg-amber-100 text-amber-700 font-medium shadow hover:shadow-md transition">Соленое 🍕</button>
                    <button data-cat="both" class="cat-btn px-5 py-2 rounded-full bg-rose-100 text-rose-700 font-medium shadow hover:shadow-md transition">И того, и другого! ✨</button>
                </div>
                <div id="checkboxFoodsArea" class="hidden transition-all duration-300 bg-white/30 rounded-2xl p-5 mb-6">
                    <p class="font-medium text-stone-600 mb-3 text-center">Выбери вкусняшки:</p>
                    <div id="foodCheckboxes" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                </div>
                <div class="flex justify-between items-center mt-6 gap-3">
                    <button id="backFromFood" class="btn-back px-6 py-2 rounded-full text-rose-700 font-medium shadow-sm flex items-center gap-1 transition">← Назад</button>
                    <button id="nextToDrinks" class="bg-gradient-to-r from-amber-300 to-rose-300 text-gray-800 font-bold px-8 py-2 rounded-full shadow-lg disabled:opacity-40 transition" disabled>Далее ➡️</button>
                </div>
            </div>
            <div id="step3" class="step hidden-step w-full">
                <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-semibold text-center text-rose-800 mb-6">🍹 А что по напиткам?</h2>
                <div id="drinksList" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8 bg-white/20 p-5 rounded-2xl"></div>
                <div class="flex justify-between items-center gap-3">
                    <button id="backFromDrinks" class="btn-back px-6 py-2 rounded-full text-rose-700 font-medium shadow-sm flex items-center gap-1 transition">← Назад</button>
                    <button id="nextToTime" class="bg-gradient-to-r from-rose-300 to-amber-300 text-gray-800 font-bold px-8 py-2 rounded-full shadow-lg">Далее 🍾</button>
                </div>
            </div>
            <div id="step4" class="step hidden-step w-full">
                <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-semibold text-center text-rose-800 mb-6">📅 Когда мне заехать?</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-stone-700 font-medium mb-2">Выбери дату и время 💫</label>
                        <input type="datetime-local" id="visitDatetime" class="w-full p-3 rounded-2xl border-rose-200 focus:ring-2 focus:ring-rose-300">
                    </div>
                    <div>
                        <label class="block text-stone-700 font-medium mb-2">Твои пожелания... 💌</label>
                        <textarea id="commentInput" rows="3" placeholder="Напиши что-то важное, может, секретный ингредиент вечера..."></textarea>
                    </div>
                    <div class="flex justify-between items-center gap-3">
                        <button id="backFromDateTime" class="btn-back px-6 py-2 rounded-full text-rose-700 font-medium shadow-sm flex items-center gap-1 transition">← Назад</button>
                        <button id="submitFinalBtn" class="bg-gradient-to-r from-rose-500 to-pink-500 text-white font-bold py-2 px-6 rounded-full text-lg shadow-xl hover:scale-[1.02] transition">Отправить заявку! ❤️</button>
                    </div>
                </div>
            </div>
            <div id="finalScreen" class="step hidden-step w-full text-center">
                <div class="text-7xl mb-4">🎉❤️</div>
                <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl text-rose-700 font-bold">Ура! План составлен!</h2>
                <p class="text-lg text-stone-700 my-4">Жду встречи с нетерпением! <br> Отправь мне скриншот этого экрана 📸</p>
                <button id="resetButton" class="mt-6 bg-white/60 border border-rose-300 px-5 py-2 rounded-full text-rose-600">✨ Заново ✨</button>
            </div>
        </div>
    </div>
    <script>
        let appData = {
            foodCategory: null,
            selectedFoods: [],
            selectedDrinks: [],
            visitDateTime: '',
            commentText: ''
        };
        const allFoodItems = [
            { name: 'Шоколадки 🍫', type: 'sweet' },
            { name: 'Чипсы 🥔', type: 'salty' },
            { name: 'Пицца 🍕', type: 'salty' },
            { name: 'Суши 🍣', type: 'salty' },
            { name: 'Фрукты 🍒', type: 'sweet' },
            { name: 'Мороженое 🍨', type: 'sweet' }
        ];
        const drinkItems = [
            { name: 'Пиво 🍺', value: 'Пиво' },
            { name: 'Газировка 🥤', value: 'Газировка' },
            { name: 'Крепкие напитки 🥃', value: 'Крепкий алкоголь' },
            { name: 'Вино 🍷', value: 'Вино' },
            { name: 'Чай/Кофе ☕️', value: 'Чай/Кофе' }
        ];
        let currentStep = 1;
        let categorySelected = false;
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const step4 = document.getElementById('step4');
        const finalScreen = document.getElementById('finalScreen');
        const steps = [step1, step2, step3, step4, finalScreen];
        function showStep(stepNumber) {
            steps.forEach((step, idx) => {
                if (idx + 1 === stepNumber) step.classList.remove('hidden-step');
                else step.classList.add('hidden-step');
            });
            currentStep = stepNumber;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function renderFoodByCategory(category) {
            const container = document.getElementById('foodCheckboxes');
            if (!container) return;
            let filtered = [];
            if (category === 'sweet') filtered = allFoodItems.filter(item => item.type === 'sweet');
            else if (category === 'salty') filtered = allFoodItems.filter(item => item.type === 'salty');
            else filtered = [...allFoodItems];
            container.innerHTML = '';
            filtered.forEach(item => {
                const label = document.createElement('label');
                label.className = 'flex items-center bg-white/40 rounded-xl p-2 px-3 cursor-pointer hover:bg-white/60 transition';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = item.name;
                cb.className = 'romantic-checkbox';
                if (appData.selectedFoods.includes(item.name)) cb.checked = true;
                cb.addEventListener('change', updateSelectedFoods);
                const span = document.createElement('span');
                span.textContent = item.name;
                span.className = 'text-stone-700';
                label.appendChild(cb);
                label.appendChild(span);
                container.appendChild(label);
            });
            updateSelectedFoods();
        }
        function updateSelectedFoods() {
            const checkboxes = document.querySelectorAll('#foodCheckboxes input[type="checkbox"]');
            appData.selectedFoods = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
        }
        function renderDrinks() {
            const container = document.getElementById('drinksList');
            container.innerHTML = '';
            drinkItems.forEach(drink => {
                const label = document.createElement('label');
                label.className = 'flex items-center bg-white/40 rounded-xl p-3 cursor-pointer hover:bg-white/60 transition gap-2';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = drink.value;
                cb.className = 'romantic-checkbox';
                if (appData.selectedDrinks.includes(drink.value)) cb.checked = true;
                cb.addEventListener('change', updateSelectedDrinks);
                const span = document.createElement('span');
                span.textContent = drink.name;
                span.className = 'text-stone-800 text-lg';
                label.appendChild(cb);
                label.appendChild(span);
                container.appendChild(label);
            });
            updateSelectedDrinks();
        }
        function updateSelectedDrinks() {
            const drinkCbs = document.querySelectorAll('#drinksList input[type="checkbox"]');
            appData.selectedDrinks = Array.from(drinkCbs).filter(cb => cb.checked).map(cb => cb.value);
        }
        const noButton = document.getElementById('noBtn');
        const buttonContainer = document.getElementById('buttonContainer');
        const noMessages = ["😢 Ну пожалуйста!", "💔 Ты серьезно?", "🌸 Передумай!", "✨ Соглашайся!", "🥺 Не будь врединой!", "💗 Ты уверена?", "🍭 Давай, жми 'Да'!", "🌹 Я так хочу приехать!", "🎀 Не ломай мое сердечко!", "💕 А может всё же 'Да'?"];
        function getBoundedOffset(btn, parent) {
            if (!btn || !parent) return { dx: 0, dy: 0 };
            const originalTransform = btn.style.transform;
            btn.style.transform = 'none';
            const origRect = btn.getBoundingClientRect();
            btn.style.transform = originalTransform;
            const parentRect = parent.getBoundingClientRect();
            const maxOffsetX = 70;
            const maxOffsetY = 60;
            let dx = (Math.random() * maxOffsetX * 2) - maxOffsetX;
            let dy = (Math.random() * maxOffsetY * 2) - maxOffsetY;
            const newLeft = origRect.left + dx;
            const newRight = origRect.right + dx;
            if (newLeft < parentRect.left) dx = parentRect.left - origRect.left + 5;
            if (newRight > parentRect.right) dx = parentRect.right - origRect.right - 5;
            const newTop = origRect.top + dy;
            const newBottom = origRect.bottom + dy;
            if (newTop < parentRect.top) dy = parentRect.top - origRect.top + 5;
            if (newBottom > parentRect.bottom) dy = parentRect.bottom - origRect.bottom - 5;
            return { dx, dy };
        }
        function moveNoButtonWithBounds() {
            if (!noButton || !buttonContainer) return;
            const { dx, dy } = getBoundedOffset(noButton, buttonContainer);
            noButton.style.transform = `translate(${dx}px, ${dy}px) scale(0.96)`;
            noButton.style.transition = 'transform 0.2s cubic-bezier(0.3, 1.4, 0.6, 1)';
            setTimeout(() => {
                if (noButton) noButton.style.transform = `translate(${dx}px, ${dy}px) scale(1)`;
            }, 120);
        }
        function resetNoButtonPosition() {
            if (noButton) noButton.style.transform = '';
        }
        let noHoverActive = false;
        if (noButton && buttonContainer) {
            noButton.addEventListener('mouseenter', () => {
                if (!noHoverActive) {
                    moveNoButtonWithBounds();
                    noHoverActive = true;
                    setTimeout(() => { noHoverActive = false; }, 300);
                }
            });
            setInterval(() => {
                if (noButton && noButton.matches(':hover')) moveNoButtonWithBounds();
            }, 400);
            noButton.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const randomMsg = noMessages[Math.floor(Math.random() * noMessages.length)];
                const rect = noButton.getBoundingClientRect();
                showFloatingMessage(randomMsg, rect.left + rect.width/2, rect.top);
                moveNoButtonWithBounds();
                noButton.style.transform += ' scale(0.9)';
                setTimeout(() => {
                    if (noButton) {
                        const currentTransform = noButton.style.transform;
                        noButton.style.transform = currentTransform.replace(' scale(0.9)', '');
                    }
                }, 180);
                return false;
            });
        }
        function showFloatingMessage(msg, x, y) {
            const div = document.createElement('div');
            div.className = 'floating-message';
            div.textContent = msg;
            div.style.left = (x - 60) + 'px';
            div.style.top = (y - 45) + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 900);
        }
        const stickerTypes = ['❤️', '💖', '💗', '🌸', '✨', '💕', '💘', '🌹', '⭐', '🌟', '🍀', '💫', '🕊️', '🌺'];
        function createFallingSticker() {
            const container = document.getElementById('stickers-container');
            if (!container) return;
            const sticker = document.createElement('div');
            sticker.className = 'falling-sticker';
            const randomSticker = stickerTypes[Math.floor(Math.random() * stickerTypes.length)];
            sticker.innerHTML = randomSticker;
            const size = Math.random() * 18 + 16;
            sticker.style.fontSize = size + 'px';
            sticker.style.left = Math.random() * 100 + '%';
            const duration = Math.random() * 6 + 4;
            sticker.style.animationDuration = duration + 's';
            sticker.style.animationDelay = Math.random() * 2 + 's';
            sticker.style.opacity = Math.random() * 0.6 + 0.3;
            container.appendChild(sticker);
            setTimeout(() => sticker.remove(), duration * 1000 + 500);
        }
        setInterval(createFallingSticker, 200);
        for(let i = 0; i < 25; i++) setTimeout(() => createFallingSticker(), i * 70);
        document.getElementById('yesBtn').addEventListener('click', () => {
            showStep(2);
        });
        const catBtns = document.querySelectorAll('.cat-btn');
        const foodArea = document.getElementById('checkboxFoodsArea');
        const nextToDrinksBtn = document.getElementById('nextToDrinks');
        catBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const category = btn.getAttribute('data-cat');
                appData.foodCategory = category;
                categorySelected = true;
                if (foodArea.classList.contains('hidden')) foodArea.classList.remove('hidden');
                renderFoodByCategory(category);
                catBtns.forEach(b => b.classList.remove('bg-rose-200', 'shadow-inner'));
                btn.classList.add('bg-rose-200', 'shadow-inner');
                nextToDrinksBtn.disabled = false;
            });
        });
        nextToDrinksBtn.addEventListener('click', () => {
            if (!categorySelected) {
                alert('Выбери категорию блюд, милая ✨');
                return;
            }
            updateSelectedFoods();
            if (!document.querySelector('#drinksList input')) renderDrinks();
            showStep(3);
        });
        document.getElementById('backFromFood').addEventListener('click', () => {
            showStep(1);
            resetNoButtonPosition();
        });
        document.getElementById('nextToTime').addEventListener('click', () => {
            updateSelectedDrinks();
            showStep(4);
            const datetimeInput = document.getElementById('visitDatetime');
            if (appData.visitDateTime) datetimeInput.value = appData.visitDateTime;
            const commentInput = document.getElementById('commentInput');
            if (appData.commentText) commentInput.value = appData.commentText;
        });
        document.getElementById('backFromDrinks').addEventListener('click', () => {
            updateSelectedDrinks();
            showStep(2);
            if (appData.foodCategory) {
                categorySelected = true;
                foodArea.classList.remove('hidden');
                renderFoodByCategory(appData.foodCategory);
                catBtns.forEach(btn => {
                    if (btn.getAttribute('data-cat') === appData.foodCategory) {
                        btn.classList.add('bg-rose-200', 'shadow-inner');
                    } else {
                        btn.classList.remove('bg-rose-200', 'shadow-inner');
                    }
                });
                nextToDrinksBtn.disabled = false;
            } else {
                foodArea.classList.add('hidden');
                nextToDrinksBtn.disabled = true;
            }
        });
        document.getElementById('backFromDateTime').addEventListener('click', () => {
            appData.visitDateTime = document.getElementById('visitDatetime').value;
            appData.commentText = document.getElementById('commentInput').value;
            showStep(3);
            renderDrinks();
        });
        const submitBtn = document.getElementById('submitFinalBtn');
        submitBtn.addEventListener('click', async () => {
            const datetime = document.getElementById('visitDatetime').value;
            const comment = document.getElementById('commentInput').value;
            if (!datetime) {
                alert('Пожалуйста, выбери дату и время 🕰️');
                return;
            }
            appData.visitDateTime = datetime;
            appData.commentText = comment;
            const foodList = appData.selectedFoods.length ? appData.selectedFoods.join(', ') : 'Ничего не выбрано';
            const drinksList = appData.selectedDrinks.length ? appData.selectedDrinks.join(', ') : 'Не указаны';
            const categoryText = appData.foodCategory === 'sweet' ? 'Сладкое' : (appData.foodCategory === 'salty' ? 'Соленое' : 'И того, и другого!');
            const messageBody = `
✨ РОМАНТИЧЕСКОЕ ПРИГЛАШЕНИЕ ✨

🍽 Категория еды: ${categoryText}
🍕 Выбранные вкусности: ${foodList}
🥤 Напитки: ${drinksList}
📅 Дата и время: ${appData.visitDateTime}
💌 Пожелания: ${appData.commentText || '—'}

💖 Жду встречи с нетерпением! 💖
            `;
            try {
                const response = await fetch('https://formspree.io/f/xbdbnbqk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: messageBody,
                        _subject: '❤️ Романтическое приглашение от любимого человека!',
                        _replyto: 'surkidnp@gmail.com'
                    })
                });
                if (response.ok) {
                    canvasConfetti({ particleCount: 180, spread: 100, origin: { y: 0.6 }, colors: ['#f7b0a5', '#fbd7cb', '#e4b5a0'] });
                    canvasConfetti({ particleCount: 70, spread: 60, origin: { y: 0.7, x: 0.3 }, startVelocity: 20 });
                    canvasConfetti({ particleCount: 70, spread: 60, origin: { y: 0.7, x: 0.7 }, startVelocity: 20 });
                    showStep(5);
                } else {
                    alert('Ой, что-то пошло не так... но ты можешь отправить скриншот мне в соцсети! 💌');
                    showStep(5);
                    canvasConfetti({ particleCount: 100, spread: 70 });
                }
            } catch (err) {
                console.error(err);
                alert('Твои ответы уже летят ко мне! Жду с нетерпением');
                showStep(5);
                canvasConfetti({ particleCount: 120, spread: 80 });
            }
        });
        const resetBtn = document.getElementById('resetButton');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                appData = { foodCategory: null, selectedFoods: [], selectedDrinks: [], visitDateTime: '', commentText: '' };
                categorySelected = false;
                if (foodArea) foodArea.classList.add('hidden');
                const datetimeInput = document.getElementById('visitDatetime');
                if (datetimeInput) datetimeInput.value = '';
                const commentTextarea = document.getElementById('commentInput');
                if (commentTextarea) commentTextarea.value = '';
                if (nextToDrinksBtn) nextToDrinksBtn.disabled = true;
                catBtns.forEach(b => b.classList.remove('bg-rose-200', 'shadow-inner'));
                const drinkCbs = document.querySelectorAll('#drinksList input');
                drinkCbs.forEach(cb => cb.checked = false);
                showStep(1);
                resetNoButtonPosition();
            });
        }
        renderDrinks();
        renderFoodByCategory('sweet');
        if (nextToDrinksBtn) nextToDrinksBtn.disabled = true;
    </script>
</body>
</html>
